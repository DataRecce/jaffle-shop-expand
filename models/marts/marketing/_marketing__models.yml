models:
  - name: fct_campaigns
    config:
      tags: ['type:fact']
    description: >
      Fact table for marketing campaigns enriched with spend summaries.
      One row per campaign.
    columns:
      - name: campaign_id
        description: The unique key for each campaign.
        data_tests:
          - not_null
          - unique
      - name: campaign_name
        description: Human-readable campaign name.
      - name: total_spend
        description: Total amount spent on the campaign in dollars.
      - name: budget_utilization
        description: Ratio of actual spend to budget.

  - name: fct_coupon_redemptions
    config:
      tags: ['type:fact']
    description: >
      Fact table for coupon redemptions enriched with coupon and order details.
      One row per redemption event.
    columns:
      - name: redemption_id
        description: The unique key for each redemption.
        data_tests:
          - not_null
          - unique
      - name: coupon_id
        description: Foreign key to coupons.
        data_tests:
          - not_null
      - name: order_id
        description: Foreign key to orders.
        data_tests:
          - not_null
      - name: discount_applied
        description: Actual discount amount applied in dollars.
      - name: net_order_total
        description: Order total after discount in dollars.

  - name: fct_loyalty_transactions
    config:
      tags: ['type:fact']
    description: >
      Fact table for loyalty point transactions with member context and running balance.
      One row per transaction.
    columns:
      - name: loyalty_transaction_id
        description: The unique key for each loyalty transaction.
        data_tests:
          - not_null
          - unique
      - name: loyalty_member_id
        description: Foreign key to loyalty members.
        data_tests:
          - not_null
      - name: transaction_type
        description: Type of transaction (earn, redeem, expire, bonus).
      - name: points
        description: Number of points (positive for earn, negative for redeem/expire).
      - name: running_points_balance
        description: Cumulative points balance after this transaction.

  - name: fct_email_events
    config:
      tags: ['type:fact']
    description: >
      Fact table for email events enriched with campaign details and boolean flags.
      One row per email event.
    columns:
      - name: email_event_id
        description: The unique key for each email event.
        data_tests:
          - not_null
          - unique
      - name: campaign_id
        description: Foreign key to campaigns.
      - name: customer_id
        description: Foreign key to customers.
      - name: email_event_type
        description: Type of email event (sent, opened, clicked, unsubscribed, bounced).

  - name: dim_coupons
    config:
      tags: ['type:dimension']
    description: >
      Dimension table for coupons with discount descriptions and validity flags.
      One row per coupon.
    columns:
      - name: coupon_id
        description: The unique key for each coupon.
        data_tests:
          - not_null
          - unique
      - name: coupon_code
        description: The code customers enter to redeem the coupon.
      - name: discount_description
        description: Human-readable discount description.
      - name: is_currently_valid
        description: Whether the coupon is currently active and within validity dates.

  - name: dim_loyalty_members
    config:
      tags: ['type:dimension']
    description: >
      Dimension table for loyalty members with tier progression details.
      One row per member.
    columns:
      - name: loyalty_member_id
        description: The unique key for each loyalty member.
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: Foreign key to customers.
        data_tests:
          - not_null
      - name: current_tier_name
        description: Name of the member's currently assigned tier.
      - name: is_active_member
        description: Whether the member has active status.
      - name: is_tier_mismatched
        description: Whether the assigned tier differs from the earned tier.

  - name: dim_loyalty_tiers
    config:
      tags: ['type:dimension']
    description: >
      Dimension table for loyalty tier definitions with ranking.
      One row per tier.
    columns:
      - name: tier_id
        description: The unique key for each tier.
        data_tests:
          - not_null
          - unique
      - name: tier_name
        description: Name of the tier (Bronze, Silver, Gold, Platinum).
      - name: minimum_points
        description: Minimum points required to reach this tier.
      - name: tier_rank
        description: Tier rank ordered from lowest to highest.

  - name: dim_campaigns
    config:
      tags: ['type:dimension']
    description: >
      Dimension table for campaigns with derived activity flags and duration.
      One row per campaign.
    columns:
      - name: campaign_id
        description: The unique key for each campaign.
        data_tests:
          - not_null
          - unique
      - name: campaign_name
        description: Human-readable campaign name.
      - name: is_currently_active
        description: Whether the campaign is currently active.
      - name: campaign_duration_days
        description: Duration of the campaign in days.

  - name: rpt_campaign_effectiveness
    config:
      tags: ['type:report']
    description: >
      Campaign effectiveness report with ROI, effectiveness tiers, and net profit.
      One row per campaign.
    columns:
      - name: campaign_id
        description: The unique key for each campaign.
        data_tests:
          - not_null
          - unique
      - name: effectiveness_tier
        description: Performance classification (exceptional, strong, moderate, break_even, negative, no_spend).
      - name: net_profit
        description: Revenue minus spend minus discounts.
      - name: roi_ratio
        description: Return on investment ratio.

  - name: rpt_loyalty_program_health
    config:
      tags: ['type:report']
    description: >
      Loyalty program health dashboard showing member distribution, point activity,
      and redemption rates by tier.
    columns:
      - name: current_tier_name
        description: Loyalty tier name.
      - name: member_count
        description: Number of members in this tier.
      - name: active_members
        description: Number of active members in this tier.
      - name: tier_redemption_rate
        description: Points redemption rate for this tier.
      - name: tier_member_share
        description: Proportion of total members in this tier.

  - name: rpt_coupon_roi
    config:
      tags: ['type:report']
    description: >
      Coupon ROI report combining coupon performance with campaign-level financials.
      One row per coupon.
    columns:
      - name: coupon_id
        description: The unique key for each coupon.
        data_tests:
          - not_null
          - unique
      - name: total_redemptions
        description: Total number of redemptions.
      - name: total_discount_given
        description: Total discount amount in dollars.
      - name: estimated_coupon_roi
        description: Estimated ROI for this coupon.

  - name: rpt_customer_acquisition_funnel
    config:
      tags: ['type:report']
    description: >
      Customer acquisition funnel showing volume and share by acquisition source.
      One row per acquisition source.
    columns:
      - name: acquisition_source
        description: Acquisition channel (referral, campaign, organic).
        data_tests:
          - not_null
          - unique
      - name: total_customers
        description: Number of customers acquired through this source.
      - name: source_share
        description: Proportion of total customers from this source.

  - name: rpt_email_performance
    config:
      tags: ['type:report']
    description: >
      Email performance report with funnel metrics and performance classifications.
      One row per campaign-subject combination.
    columns:
      - name: campaign_id
        description: Foreign key to campaigns.
      - name: open_rate
        description: Proportion of sent emails that were opened.
      - name: click_through_rate
        description: Proportion of opened emails that were clicked.
      - name: open_rate_tier
        description: Performance classification for open rate (excellent, good, average, poor).
      - name: ctr_tier
        description: Performance classification for click-through rate.

  - name: rpt_channel_attribution
    config:
      tags: ['type:report']
    description: >
      Channel attribution report showing customer acquisition, spend, and ROI by channel.
      One row per channel.
    columns:
      - name: channel
        description: Marketing or acquisition channel.
        data_tests:
          - not_null
          - unique
      - name: customers_acquired
        description: Number of customers acquired through this channel.
      - name: cost_per_acquisition
        description: Average cost to acquire one customer through this channel.
      - name: channel_roi
        description: Return on investment for this channel.

  - name: rpt_referral_program_summary
    config:
      tags: ['type:report']
    description: >
      Referral program summary showing top referrers, conversion rates, and ROI.
      One row per referrer who has successful referrals.
    columns:
      - name: referrer_customer_id
        description: The customer who made referrals.
        data_tests:
          - not_null
          - unique
      - name: successful_referrals
        description: Number of converted referrals.
      - name: referee_total_revenue
        description: Total revenue from referred customers.
      - name: referrer_roi
        description: ROI of rewards paid vs revenue from referred customers.
      - name: referrer_rank
        description: Rank by total referred customer revenue.
